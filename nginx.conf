# content negotiation: when client sends Accept: text/markdown, prefer .md variant
map $http_accept $md_suffix {
    default "";
    "~*text/markdown" ".md";
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml text/markdown application/linkset+json;

    # security + agent discovery headers (inherited where no local add_header)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Vary "Accept" always;
    add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"" always;

    error_page 404 /404.html;

    # Do not turn scanner probes for logs/config/secrets into successful SPA-style pages.
    location ~* (^|/)\. { return 404; }
    location ~* \.(?:log|env|ini|conf|bak|backup|old|orig|sql|sqlite|db|pem|key|crt|yml|yaml)(?:\..*)?$ { return 404; }

    # spa-style fallback for astro pages, with markdown content negotiation.
    # default_type catches .md files (unknown extension in nginx's mime map).
    location / {
        default_type "text/markdown; charset=utf-8";
        try_files ${uri}${md_suffix} ${uri}/index${md_suffix} $uri $uri/ ${uri}.html =404;
    }

    # security contact (RFC 9116). Exact match bypasses the generic hidden-file block.
    location = /.well-known/security.txt {
        default_type "text/plain; charset=utf-8";
        try_files $uri =404;
    }

    # api catalog (RFC 9727 / RFC 9264 linkset)
    location = /.well-known/api-catalog {
        default_type "application/linkset+json";
        try_files $uri =404;
    }

    # hashed astro assets -- immutable, cache forever
    location /_astro/ {
        expires 1y;
        access_log off;
    }

    # other static assets
    location ~* \.(png|jpg|jpeg|webp|gif|ico|svg|woff2?|ttf|eot|pdf)$ {
        expires 30d;
        access_log off;
    }

    # css/js without hashes
    location ~* \.(css|js)$ {
        expires 7d;
    }

    # proxy api (chat + events) to rust backend
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $backend http://chat-api:3001;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # add_header at this level overrides inherited server-level headers; re-add what we need
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Vary "Accept" always;
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\"" always;
    }
}
