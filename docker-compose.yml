services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - chat-api
    restart: unless-stopped

  chat-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - portfolio
    restart: unless-stopped
