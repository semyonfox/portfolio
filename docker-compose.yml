services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - chat-api
    restart: unless-stopped

  chat-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ${PORTFOLIO_ENV_FILE:-.env}
    environment:
      - DB_PATH=/data/portfolio.db
    volumes:
      - chat-data:/data
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - portfolio
    restart: unless-stopped

volumes:
  chat-data:
